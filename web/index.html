<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performant Snake</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: "Courier New", Courier, monospace;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        a {
            color: #8ff0a4;
        }

        .panel {
            padding: 16px;
            border: 1px solid #3f3f3f;
            background: #111;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 1px solid #3f3f3f;
            background: #101820;
            image-rendering: pixelated;
        }

        button {
            margin-top: 12px;
            padding: 8px 12px;
            border: 1px solid #3f3f3f;
            background: #191919;
            color: #f5f5f5;
            font: inherit;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <p><a href="../">back</a></p>
        <h1>performant snake</h1>
        <div class="panel">
            <div class="hud">
                <div id="score">score: 0</div>
                <div id="message">arrow keys or wasd to move</div>
            </div>
            <canvas id="game" width="600" height="400" aria-label="Snake game"></canvas>
            <button id="restart" type="button">restart</button>
        </div>
    </main>
    <script src="./snake.js"></script>
</body>
</html>
